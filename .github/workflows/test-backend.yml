name: test-backend

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build and test with Maven
        working-directory: java-hello/simpleapi
        run: mvn clean verify -DskipTests

      - name: SonarCloud analysis
        run: mvn -B verify sonar:sonar -Dsonar.projectKey=camilleepech_DevOps_PECH -Dsonar.organization=camilleepech -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${{ secrets.SONAR_TOKEN }}  --file ./java-hello/simpleapi/pom.xml